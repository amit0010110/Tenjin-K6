services:
  - type: web
    name: tenjink6-backend
    runtime: docker
    plan: free
    dockerfilePath: ./packages/backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: file:./dev.db
      - key: RABBITMQ_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3001

  - type: web
    name: tenjink6-frontend
    runtime: static
    buildCommand: npm ci && npm run build -w packages/shared && npm run build -w packages/frontend
    staticPublishPath: packages/frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://tenjink6-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
